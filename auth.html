<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Японский: вход</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="./img/40-406197_wuxi-is-famous-for-being-one-of-the-birthplaces-of-pagoda-png__1_-removebg-preview.png" type="image/png">
</head>
<body class="auth-page">
  <main class="auth-main">
    <article class="auth-screen">
      <h1>Добро пожаловать</h1>
      <p>Войдите или зарегистрируйтесь, чтобы сохранить личный прогресс.</p>

      <div class="toolbar auth-switch">
        <button id="showLoginBtn">Войти</button>
        <button id="showRegisterBtn">Регистрация</button>
      </div>

      <div class="auth-form">
        <input id="authUsername" type="text" placeholder="Логин" />
        <input id="authPassword" type="password" placeholder="Пароль" />
        <button id="authSubmitBtn">Войти</button>
        <button id="guestEnterBtn">Продолжить как гость</button>
      </div>

      <p id="authMessage"></p>
    </article>
  </main>

  <script type="module" src="auth.js"></script>
</body>
</html>
